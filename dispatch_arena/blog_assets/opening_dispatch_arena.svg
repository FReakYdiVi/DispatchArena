<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Food delivery opening animation</title>
  <desc id="desc">A simple opening animation with a food delivery rider moving through a city under a large clock and location pin.</desc>
  <defs>
    <style>
      .title { font: 800 44px Inter, ui-sans-serif, system-ui, sans-serif; fill: #111827; }
      .subtitle { font: 500 20px Inter, ui-sans-serif, system-ui, sans-serif; fill: #4b5563; }
      .small { font: 600 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #6b7280; }
      .road-line { stroke: #cbd5e1; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 210 70; animation: road 2.2s linear infinite; }
      .wheel { transform-box: fill-box; transform-origin: center; animation: spin 1s linear infinite; }
      .rider { animation: glide 3.2s ease-in-out infinite; transform-origin: center; }
      .pin { animation: bounce 1.8s ease-in-out infinite; transform-origin: center; }
      .minute { transform-origin: 230px 230px; animation: minute 7s linear infinite; }
      .hour { transform-origin: 230px 230px; animation: hour 14s linear infinite; }
      .cloud { animation: drift 8s ease-in-out infinite; }
      @keyframes road { to { stroke-dashoffset: -280; } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes glide {
        0%, 100% { transform: translateX(-12px); }
        50% { transform: translateX(12px); }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-14px); }
      }
      @keyframes minute { to { transform: rotate(360deg); } }
      @keyframes hour { to { transform: rotate(30deg); } }
      @keyframes drift {
        0%, 100% { transform: translateX(0); opacity: .8; }
        50% { transform: translateX(22px); opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1400" height="760" fill="#ffffff"/>

  <text x="700" y="76" text-anchor="middle" class="title">Dispatch Arena</text>
  <text x="700" y="110" text-anchor="middle" class="subtitle">a delivery dispatch story about time, location, and messy real-world decisions</text>

  <!-- Soft sky details -->
  <g class="cloud" opacity=".45">
    <ellipse cx="1035" cy="165" rx="42" ry="20" fill="#e5e7eb"/>
    <ellipse cx="1070" cy="160" rx="34" ry="24" fill="#e5e7eb"/>
    <ellipse cx="1105" cy="168" rx="48" ry="18" fill="#e5e7eb"/>
  </g>
  <g class="cloud" opacity=".35" style="animation-delay:1.2s">
    <ellipse cx="545" cy="155" rx="38" ry="18" fill="#e5e7eb"/>
    <ellipse cx="578" cy="150" rx="30" ry="22" fill="#e5e7eb"/>
    <ellipse cx="610" cy="158" rx="44" ry="17" fill="#e5e7eb"/>
  </g>

  <!-- Clock -->
  <g transform="translate(70 105)">
    <circle cx="230" cy="230" r="158" fill="#ffffff" stroke="#ff7a1a" stroke-width="16"/>
    <circle cx="230" cy="230" r="137" fill="none" stroke="#e5e7eb" stroke-width="4"/>
    <g stroke="#4b5563" stroke-width="8" stroke-linecap="round">
      <line x1="230" y1="90" x2="230" y2="72"/>
      <line x1="230" y1="390" x2="230" y2="372"/>
      <line x1="90" y1="230" x2="72" y2="230"/>
      <line x1="390" y1="230" x2="372" y2="230"/>
      <line x1="132" y1="132" x2="120" y2="120"/>
      <line x1="328" y1="132" x2="340" y2="120"/>
      <line x1="132" y1="328" x2="120" y2="340"/>
      <line x1="328" y1="328" x2="340" y2="340"/>
    </g>
    <line x1="230" y1="230" x2="230" y2="116" stroke="#ff7a1a" stroke-width="8" stroke-linecap="round" class="minute"/>
    <line x1="230" y1="230" x2="184" y2="184" stroke="#ff7a1a" stroke-width="10" stroke-linecap="round" class="hour"/>
    <circle cx="230" cy="230" r="18" fill="#cbd5e1"/>
  </g>

  <!-- City skyline -->
  <g transform="translate(55 300)">
    <rect x="40" y="170" width="64" height="120" fill="#d9dee9"/>
    <rect x="115" y="126" width="105" height="164" fill="#c5cad8"/>
    <rect x="140" y="155" width="55" height="135" fill="#e8ebf2"/>
    <rect x="240" y="96" width="78" height="194" fill="#b9bfce"/>
    <rect x="330" y="135" width="64" height="155" fill="#d1d6e2"/>
    <rect x="430" y="180" width="76" height="110" fill="#c7ccda"/>
    <rect x="535" y="140" width="86" height="150" fill="#d8dde8"/>
    <rect x="660" y="108" width="92" height="182" fill="#b8bfce"/>
    <rect x="780" y="160" width="68" height="130" fill="#d6dbe7"/>
    <rect x="900" y="132" width="82" height="158" fill="#c3c9d7"/>
    <rect x="1005" y="95" width="112" height="195" fill="#d2d7e3"/>
    <rect x="1135" y="155" width="95" height="135" fill="#e0e4ec"/>
    <rect x="1245" y="188" width="62" height="102" fill="#cfd5e1"/>

    <g fill="#f8fafc" opacity=".85">
      <rect x="135" y="150" width="72" height="10"/>
      <rect x="135" y="180" width="72" height="10"/>
      <rect x="135" y="210" width="72" height="10"/>
      <rect x="258" y="118" width="42" height="13"/>
      <rect x="258" y="148" width="42" height="13"/>
      <rect x="1018" y="120" width="36" height="13"/>
      <rect x="1068" y="120" width="36" height="13"/>
      <rect x="1018" y="154" width="36" height="13"/>
      <rect x="1068" y="154" width="36" height="13"/>
      <rect x="1154" y="180" width="54" height="10"/>
      <rect x="1154" y="210" width="54" height="10"/>
    </g>
  </g>

  <!-- Road -->
  <rect x="0" y="620" width="1400" height="140" fill="#ffffff"/>
  <line x1="0" y1="622" x2="1400" y2="622" stroke="#d1d5db" stroke-width="5"/>
  <line x1="45" y1="685" x2="1355" y2="685" class="road-line"/>

  <!-- Location pin -->
  <g transform="translate(785 246)">
    <g class="pin">
      <path d="M0 64 C-36 23 -36 -23 0 -58 C36 -23 36 23 0 64Z" fill="#ff7a1a"/>
      <circle cx="0" cy="-18" r="18" fill="#ffffff"/>
      <path d="M0 -36 v18 h20" fill="none" stroke="#ff7a1a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Scooter and rider -->
  <g transform="translate(600 510)">
  <g class="rider">
    <!-- scooter body -->
    <path d="M-86 58 C-58 28 3 30 30 58 L86 58 C102 58 112 72 106 88 C98 108 70 112 48 98 C12 113 -46 112 -80 98 C-110 112 -135 101 -139 79 C-142 64 -130 58 -112 58Z" fill="#f43f5e"/>
    <path d="M-46 50 h92 c24 0 40 12 48 32" fill="none" stroke="#be123c" stroke-width="8" stroke-linecap="round"/>
    <path d="M52 52 c14 -42 35 -64 68 -72" fill="none" stroke="#be123c" stroke-width="8" stroke-linecap="round"/>
    <path d="M113 -20 h24" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
    <rect x="-111" y="6" width="58" height="54" rx="8" fill="#1f2937"/>
    <path d="M-84 18 l12 12 l12 -12" fill="none" stroke="#ff7a1a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- wheels -->
    <g class="wheel">
      <circle cx="-92" cy="92" r="34" fill="#111827"/>
      <circle cx="-92" cy="92" r="18" fill="#f8fafc"/>
      <line x1="-92" y1="58" x2="-92" y2="126" stroke="#94a3b8" stroke-width="4"/>
      <line x1="-126" y1="92" x2="-58" y2="92" stroke="#94a3b8" stroke-width="4"/>
    </g>
    <g class="wheel">
      <circle cx="72" cy="92" r="34" fill="#111827"/>
      <circle cx="72" cy="92" r="18" fill="#f8fafc"/>
      <line x1="72" y1="58" x2="72" y2="126" stroke="#94a3b8" stroke-width="4"/>
      <line x1="38" y1="92" x2="106" y2="92" stroke="#94a3b8" stroke-width="4"/>
    </g>

    <!-- rider -->
    <circle cx="-10" cy="-68" r="24" fill="#fed7aa"/>
    <path d="M-30 -78 c12 -30 44 -26 54 -2 c-20 -4 -36 -2 -54 2z" fill="#111827"/>
    <path d="M-20 -38 C-40 -18 -52 14 -48 40 L10 40 C12 10 4 -18 -20 -38Z" fill="#ff7a1a"/>
    <path d="M-16 -30 c24 14 48 22 76 22" fill="none" stroke="#111827" stroke-width="8" stroke-linecap="round"/>
    <path d="M6 40 l42 38" fill="none" stroke="#111827" stroke-width="9" stroke-linecap="round"/>
    <path d="M-34 40 l-34 45" fill="none" stroke="#111827" stroke-width="9" stroke-linecap="round"/>
    <path d="M-8 -60 h18" stroke="#111827" stroke-width="5" stroke-linecap="round"/>
  </g>
  </g>

  <text x="700" y="724" text-anchor="middle" class="small">A simple delivery scene: time pressure, city movement, and one order on the way.</text>
</svg>
