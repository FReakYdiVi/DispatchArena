<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Dispatch timing problem</title>
  <desc id="desc">Side by side animation comparing naive immediate assignment against a learned dispatch policy that waits or repositions before assigning.</desc>
  <defs>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669"/>
    </marker>
    <style>
      .title { font: 800 34px Inter, ui-sans-serif, system-ui, sans-serif; fill: #111827; }
      .subtitle { font: 500 17px Inter, ui-sans-serif, system-ui, sans-serif; fill: #4b5563; }
      .panel-title { font: 800 22px Inter, ui-sans-serif, system-ui, sans-serif; fill: #111827; }
      .label { font: 700 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: #374151; }
      .small { font: 600 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #4b5563; }
      .tiny { font: 600 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: #6b7280; }
      .mono { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #111827; }
      .card { fill: #ffffff; stroke: #111827; stroke-width: 2; }
      .node { fill: #ffffff; stroke: #111827; stroke-width: 2; }
      .route-red { fill: none; stroke: #dc2626; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 16 12; animation: flow 1.2s linear infinite; }
      .route-green { fill: none; stroke: #059669; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 16 12; animation: flow 1.2s linear infinite; }
      .wait { animation: blink 1.4s ease-in-out infinite; }
      .traffic { animation: shake 1.4s ease-in-out infinite; transform-origin: center; }
      @keyframes flow { to { stroke-dashoffset: -28; } }
      @keyframes blink { 0%, 100% { opacity: .45; } 50% { opacity: 1; } }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
      }
    </style>
  </defs>

  <rect width="1200" height="700" rx="28" fill="#fffaf0"/>
  <rect x="24" y="24" width="1152" height="652" rx="24" fill="#f8fbff" stroke="#111827" stroke-width="3"/>

  <text x="600" y="74" text-anchor="middle" class="title">Why Dispatch Is Hard</text>
  <text x="600" y="106" text-anchor="middle" class="subtitle">The route can look the same, but timing changes everything.</text>

  <!-- Panels -->
  <rect x="65" y="145" width="500" height="440" rx="24" class="card"/>
  <rect x="635" y="145" width="500" height="440" rx="24" class="card"/>

  <text x="315" y="188" text-anchor="middle" class="panel-title" fill="#dc2626">Naive Heuristic</text>
  <text x="315" y="214" text-anchor="middle" class="small">assign nearest courier immediately</text>
  <text x="885" y="188" text-anchor="middle" class="panel-title" fill="#059669">Learned Dispatch Policy</text>
  <text x="885" y="214" text-anchor="middle" class="small">wait or reposition before assigning</text>

  <!-- Left panel nodes -->
  <rect x="115" y="430" width="96" height="62" rx="14" class="node"/>
  <text x="163" y="456" text-anchor="middle" class="label">Hub</text>
  <text x="163" y="476" text-anchor="middle" class="tiny">courier idle</text>

  <rect x="275" y="285" width="118" height="70" rx="14" fill="#fff7ed" stroke="#111827" stroke-width="2"/>
  <text x="334" y="313" text-anchor="middle" class="label">Restaurant</text>
  <text x="334" y="336" text-anchor="middle" class="mono">prep hidden</text>

  <rect x="430" y="430" width="96" height="62" rx="14" class="node"/>
  <text x="478" y="456" text-anchor="middle" class="label">Customer</text>
  <text x="478" y="476" text-anchor="middle" class="tiny">deadline</text>

  <path d="M211 450 C255 420, 285 390, 315 355" class="route-red" marker-end="url(#arrow-red)"/>
  <path d="M363 355 C420 375, 450 400, 465 430" class="route-red" marker-end="url(#arrow-red)"/>

  <rect x="255" y="370" width="170" height="48" rx="12" fill="#fee2e2" stroke="#fca5a5" class="wait"/>
  <text x="340" y="391" text-anchor="middle" class="small">courier waits</text>
  <text x="340" y="410" text-anchor="middle" class="tiny">food not ready yet</text>

  <rect x="390" y="365" width="94" height="38" rx="10" fill="#fee2e2" stroke="#f87171" class="traffic"/>
  <text x="437" y="389" text-anchor="middle" class="small">traffic +ETA</text>

  <rect x="175" y="525" width="280" height="38" rx="12" fill="#fee2e2" stroke="#ef4444"/>
  <text x="315" y="550" text-anchor="middle" class="label" fill="#991b1b">Outcome: late delivery</text>

  <!-- Right panel nodes -->
  <rect x="685" y="430" width="96" height="62" rx="14" class="node"/>
  <text x="733" y="456" text-anchor="middle" class="label">Hub</text>
  <text x="733" y="476" text-anchor="middle" class="tiny">hold / stage</text>

  <rect x="845" y="285" width="118" height="70" rx="14" fill="#ecfdf5" stroke="#111827" stroke-width="2"/>
  <text x="904" y="313" text-anchor="middle" class="label">Restaurant</text>
  <text x="904" y="336" text-anchor="middle" class="mono">ready soon</text>

  <rect x="1000" y="430" width="96" height="62" rx="14" class="node"/>
  <text x="1048" y="456" text-anchor="middle" class="label">Customer</text>
  <text x="1048" y="476" text-anchor="middle" class="tiny">deadline</text>

  <path d="M781 450 C820 430, 855 390, 880 355" class="route-green" marker-end="url(#arrow-green)"/>
  <path d="M933 355 C990 375, 1020 400, 1035 430" class="route-green" marker-end="url(#arrow-green)"/>

  <rect x="705" y="360" width="140" height="48" rx="12" fill="#dcfce7" stroke="#86efac" class="wait"/>
  <text x="775" y="381" text-anchor="middle" class="small">wait / reposition</text>
  <text x="775" y="400" text-anchor="middle" class="tiny">avoid dead time</text>

  <rect x="895" y="370" width="160" height="44" rx="12" fill="#dcfce7" stroke="#86efac"/>
  <text x="975" y="397" text-anchor="middle" class="small">assign near ready time</text>

  <rect x="745" y="525" width="280" height="38" rx="12" fill="#dcfce7" stroke="#22c55e"/>
  <text x="885" y="550" text-anchor="middle" class="label" fill="#065f46">Outcome: on-time delivery</text>

  <!-- Bottom explanation -->
  <rect x="165" y="615" width="870" height="36" rx="18" fill="#111827" opacity=".94"/>
  <text x="600" y="638" text-anchor="middle" fill="#ffffff" style="font: 700 14px Inter, ui-sans-serif, system-ui, sans-serif;">RL target: learn timing decisions under hidden prep, traffic noise, rolling arrivals, and deadlines.</text>
</svg>
